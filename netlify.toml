# Netlify configuration — Hometown Serenity
# NOTE: DNS is intentionally NOT cut over to Netlify yet. Deploy and verify on
# the Netlify-provided URL first; attach hometownserenity.com only when ready.

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Security + privacy headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Long-cache hashed assets
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# When ready to retire the Canva site, point its links here and/or add a
# redirect at the Canva side. Netlify only controls the custom domain.
